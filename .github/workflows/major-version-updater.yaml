---
name: "Major Version Updater"
on:
  workflow_call:
    inputs:
      tag-name:
        required: true
        type: string
    secrets:
      github-token:
        required: true
permissions:
  contents: read
jobs:
  major_version_updater:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          ref: ${{ inputs.tag-name }}
          persist-credentials: false
      - name: version
        id: version
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          tag=${TAG_NAME/refs\/tags\//}
          version=${tag#v}
          major=${version%%.*}
          { echo "tag=${tag}"; echo "version=${version}"; echo "major=${major}"; } >> "$GITHUB_OUTPUT"
      - name: force update major tag
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
        run: |
          git tag -f v${{ steps.version.outputs.major }} ${{ steps.version.outputs.tag }}
          git push -f origin v${{ steps.version.outputs.major }}
